name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version in X.Y.Z format (e.g. 3.2.9)'
        required: true
        type: string

permissions: {}

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'chainguard-dev' }}
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    env:
      DATASTREAM_PATH: gpos/xml/scap/ssg/content/ssg-chainguard-gpos-ds.xml
      VERSION: ${{ inputs.version }}
    steps:
      - name: Validate version format
        run: |
          set -euo pipefail
          if ! echo "${VERSION}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be in X.Y.Z format (e.g. 3.2.9), got: ${VERSION}"
            exit 1
          fi

      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check tag does not already exist
        run: |
          set -euo pipefail
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "::error::Tag v${VERSION} already exists"
            exit 1
          fi

      - name: Generate token for PR
        uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts
        with:
          scope: ${{ github.repository }}
          identity: prepare-release

      - name: Setup gitsign
        uses: chainguard-dev/actions/setup-gitsign@de68b87302e6266db5fb5220246f8aa46fe94b67 # v1.6.14

      - name: Patch XCCDF version
        run: |
          set -euo pipefail

          if [ ! -f "${DATASTREAM_PATH}" ]; then
            echo "::error::Datastream file not found: ${DATASTREAM_PATH}"
            exit 1
          fi

          # Derive SRG-style version label "vXrYpZ" from the X.Y.Z release tag.
          # X.Y maps to the upstream SRG version (e.g. 3.2 → v3r2); Z is the
          # Chainguard patch iteration (e.g. 10 → p10). The title embeds the
          # full patch version so release artifacts are self-identifying.
          SRG_LABEL=$(echo "${VERSION}" | awk -F. '{printf "v%sr%sp%s", $1, $2, $3}')
          echo "SRG_LABEL=${SRG_LABEL}"

          cp "${DATASTREAM_PATH}" "${DATASTREAM_PATH}.bak"

          # Benchmark <ns0:version> is the machine-readable X.Y.Z.
          sed -i "s|<ns0:version>[^<]*</ns0:version>|<ns0:version>${VERSION}</ns0:version>|" \
            "${DATASTREAM_PATH}"

          # Benchmark <ns0:title> is the human-readable "… vXrYpZ" label.
          # Match the canonical "Datastream XCCDF Checklist Beta GPOS vXrY[pZ]" form
          # and rewrite just the trailing version token. The title is the first
          # <ns0:title> element in the file (inside the Benchmark metadata block);
          # profile titles elsewhere are empty (<ns0:title xml:lang="en"/>) and
          # not affected by this pattern.
          sed -i -E "0,/<ns0:title xml:lang=\"en\">Datastream XCCDF Checklist Beta GPOS v[0-9]+r[0-9]+(p[0-9]+)?<\/ns0:title>/s||<ns0:title xml:lang=\"en\">Datastream XCCDF Checklist Beta GPOS ${SRG_LABEL}</ns0:title>|" \
            "${DATASTREAM_PATH}"

          if diff -q "${DATASTREAM_PATH}.bak" "${DATASTREAM_PATH}" > /dev/null; then
            echo "::warning::Version/title were unchanged — they may already be set for ${VERSION}"
          fi
          rm "${DATASTREAM_PATH}.bak"

          {
            echo "### Version Patch"
            echo "- **File**: \`${DATASTREAM_PATH}\`"
            echo "- **Version**: \`${VERSION}\` (Benchmark title: \`${SRG_LABEL}\`)"
            echo ""
            echo "The \`xccdf-v3r2.xml\` component IDs in the datastream (\`ds:data-stream\`,"
            echo "\`ds:component-ref\`, \`ds:component\`) are intentionally NOT patched:"
            echo "they are stable string keys that downstream tooling (SCAP Viewer,"
            echo "oscap-docker pipelines) resolves by equality. Changing them per"
            echo "patch would break consumers. The user-visible version lives in"
            echo "\`<ns0:version>\` and the Benchmark \`<ns0:title>\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        id: cpr
        with:
          token: ${{ steps.octo-sts.outputs.token }}
          commit-message: |
            chore(release): update XCCDF version to ${{ inputs.version }}

            Updates the XCCDF Benchmark version element in the SCAP datastream
            to reflect release v${{ inputs.version }}.

            Signed-off-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          branch: prerelease/v${{ inputs.version }}
          delete-branch: true
          title: "chore(release): prepare release v${{ inputs.version }}"
          body: |
            ## Release v${{ inputs.version }}

            Prepares the SCAP datastream for release by updating the XCCDF Benchmark
            `<version>` element.

            | Field | Value |
            |-------|-------|
            | Version | `${{ inputs.version }}` |
            | File | `${{ env.DATASTREAM_PATH }}` |

            Once merged, the `create-release` workflow will automatically create
            tag `v${{ inputs.version }}` and publish the GitHub Release pointing at
            the merge commit.
          labels: |
            release
